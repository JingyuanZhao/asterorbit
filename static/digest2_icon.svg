<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- 定义渐变和滤镜 -->
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </radialGradient>
    <filter id="sunGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="128" height="128" fill="url(#bgGrad)" rx="12" />
  
  <!-- 星星背景 -->
  <circle cx="20" cy="22" r="1" fill="#fff" opacity="0.7" />
  <circle cx="105" cy="18" r="0.8" fill="#fff" opacity="0.5" />
  <circle cx="88" cy="35" r="1.2" fill="#fff" opacity="0.6" />
  <circle cx="32" cy="92" r="0.8" fill="#fff" opacity="0.5" />
  <circle cx="108" cy="90" r="1" fill="#fff" opacity="0.7" />
  <circle cx="45" cy="50" r="0.8" fill="#fff" opacity="0.5" />
  <circle cx="95" cy="60" r="0.8" fill="#fff" opacity="0.4" />
  <circle cx="60" cy="15" r="1.5" fill="#fff" opacity="0.8" />
  
  <!-- 轨道 -->
  <ellipse cx="64" cy="64" rx="25" ry="25" fill="none" stroke="#64748b" stroke-width="1" opacity="0.5" />
  <ellipse cx="64" cy="64" rx="38" ry="38" fill="none" stroke="#64748b" stroke-width="1" opacity="0.5" />
  <ellipse cx="64" cy="64" rx="50" ry="50" fill="none" stroke="#64748b" stroke-width="1" opacity="0.5" />
  
  <!-- 太阳 -->
  <circle cx="64" cy="64" r="14" fill="url(#sunGrad)" filter="url(#sunGlow)" />
  <circle cx="64" cy="64" r="10" fill="#fcd34d" />
  
  <!-- 小行星 -->
  <circle cx="89" cy="64" r="3" fill="#94a3b8" />
  <circle cx="64" cy="14" r="2" fill="#cbd5e1" />
  <circle cx="18" cy="64" r="2.5" fill="#94a3b8" />
  
  <!-- 轨道箭头 -->
  <path d="M 78 32 L 80 28 L 83 33 L 78 32" fill="#64748b" opacity="0.6" />
</svg>