name: Keep Hugging Face Space Alive

on:
  schedule:
    # 每天北京时间 08:00 运行（UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Space health endpoint
        run: |
          echo "Pinging https://asterorbit-digest2.hf.space/health ..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://asterorbit-digest2.hf.space/health)
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Ping failed with status $HTTP_CODE"
            exit 1
          fi
          echo "Ping succeeded"